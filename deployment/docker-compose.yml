---
volumes:
  data-prometheus: {}
  data-grafana: {}
  data-jaeger: {}

services:
  prometheus:
    image: quay.io/prometheus/prometheus:v3.1.0
    environment:
      TZ: UTC
    volumes:
      - ./container-fs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - data-prometheus:/prometheus
    ports:
      - "9090:9090/tcp"

  promsnmp:
    image: local/promsnmp:0.0.2-SNAPSHOT
    build:
      context: ..
      dockerfile: ./Dockerfile
    init: true
    tty: true
    stdin_open: true
    environment:
      TZ: UTC
      SERVER_PORT: 8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: promsnmp
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: 1.0
      OTEL_PROPAGATORS: tracecontext,baggage
    ports:
      - "8080:8080/tcp"
    depends_on:
      - jaeger

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    environment:
      TZ: UTC
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - data-grafana:/var/lib/grafana
      - ./container-fs/grafana/provisioning:/etc/grafana/provisioning/
    ports:
      - "3000:3000/tcp"
    depends_on:
      - prometheus
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - OTEL_LOGS_EXPORTER=none  # Disable logs export to Jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
